<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>教習を始める前に | 青葉自動車学校</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #258a22; --green-light: #e8f8e7; --green-dark: #1a6419;
    --orange: #f07020; --orange-light: #fff3eb;
    --red: #c0392b; --red-light: #f8d7da;
    --amber: #ffc107; --amber-light: #fff8e1;
    --gray-100: #f8f9fa; --gray-200: #e9ecef; --gray-300: #dee2e6;
    --gray-600: #6c757d; --gray-800: #343a40;
  }
  html, body { height: 100%; }
  body {
    font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
    background: var(--gray-100); color: var(--gray-800);
    display: flex; flex-direction: column; height: 100vh; height: 100dvh;
  }
  .site-header { background: var(--green); color: #fff; padding: .9rem 1.25rem; text-align: center; flex-shrink: 0; }
  .site-header h1 { font-size: 1.05rem; font-weight: 700; }
  .site-header p { font-size: .72rem; opacity: .9; margin-top: .15rem; }

  /* スライド本体 */
  #deck { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .slides { flex: 1; overflow: hidden; position: relative; }
  .slide {
    position: absolute; inset: 0; padding: 1.5rem 1.25rem 1rem; overflow-y: auto;
    scroll-behavior: smooth; -webkit-overflow-scrolling: touch;
    transform: translateX(100%); transition: transform .32s cubic-bezier(.4,0,.2,1); pointer-events: none;
  }
  .slide.active { transform: translateX(0); pointer-events: auto; }
  .slide.prev { transform: translateX(-100%); }
  /* ドラッグ中は指に追従させるためアニメを無効化 */
  .slides.dragging .slide { transition: none; }
  .slide-tag { display: inline-block; background: var(--green-light); color: var(--green-dark); font-size: .7rem; font-weight: 700; padding: .2rem .6rem; border-radius: 20px; margin-bottom: .6rem; }
  .slide h2 { font-size: 1.15rem; margin-bottom: .9rem; color: var(--green-dark); }
  .slide p, .slide li { font-size: .92rem; line-height: 1.7; margin-bottom: .5rem; }
  .slide ul, .slide ol { padding-left: 1.2rem; margin-bottom: .75rem; }
  .notice { border-radius: 10px; padding: .8rem .95rem; margin: .75rem 0; font-size: .85rem; line-height: 1.6; box-shadow: 0 1px 4px rgba(0,0,0,.04); }
  .notice.amber { background: var(--amber-light); border-left: 4px solid var(--amber); }
  .notice.orange { background: var(--orange-light); border-left: 4px solid var(--orange); color: var(--orange); }
  .notice.green { background: var(--green-light); border-left: 4px solid var(--green); color: var(--green-dark); }
  .notice.red { background: var(--red-light); border-left: 4px solid var(--red); color: var(--red); }
  .notice b { color: inherit; }
  .notice p { margin-bottom: .5rem; }
  .notice p:last-child { margin-bottom: 0; }

  /* ステップ番号付きリスト */
  .steps { list-style: none; padding-left: 0; margin-bottom: .9rem; counter-reset: step; }
  .steps > li { position: relative; padding: .55rem .7rem .55rem 2.6rem; margin-bottom: .55rem;
    background: #fff; border: 1px solid var(--gray-200); border-radius: 10px;
    box-shadow: 0 1px 3px rgba(0,0,0,.04); }
  .steps > li::before { counter-increment: step; content: counter(step); position: absolute; left: .65rem; top: 50%;
    transform: translateY(-50%); width: 1.6rem; height: 1.6rem; border-radius: 50%; background: var(--green);
    color: #fff; font-weight: 700; font-size: .8rem; display: flex; align-items: center; justify-content: center; }

  /* アイコン付きリスト */
  .icon-list { list-style: none; padding-left: 0; margin-bottom: .75rem; }
  .icon-list > li { position: relative; padding-left: 1.5rem; margin-bottom: .55rem; line-height: 1.7; }
  .icon-list > li::before { content: '✓'; position: absolute; left: 0; top: .05em; color: var(--green); font-weight: 700; font-size: .85rem; }

  /* プラン表 */
  .plan-table { width: 100%; border-collapse: collapse; margin: .8rem 0; font-size: .85rem; border: 1px solid var(--gray-300); border-radius: 8px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
  .plan-table th { background: var(--green-dark); color: #fff; padding: .55rem .65rem; text-align: left; font-weight: 700; font-size: .84rem; }
  .plan-table th:first-child { border-right: 1px solid rgba(255,255,255,.25); }
  .plan-table td { padding: .6rem .65rem; background: #fff; border-top: 1px solid var(--gray-200); vertical-align: top; line-height: 1.55; }
  .plan-table td:first-child { font-weight: 700; color: var(--green-dark); white-space: nowrap; background: var(--green-light); border-right: 1px solid var(--gray-300); }

  /* セクション見出し */
  .sub-head { display: flex; align-items: center; gap: .4rem; font-weight: 700; font-size: .95rem;
    color: var(--green-dark); margin: 1rem 0 .5rem; }
  .sub-head .dot-mark { width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex-shrink: 0; }

  /* かんたん解説ボックス */
  .explain-box { background: #fff; border: 1.5px dashed var(--green); border-radius: 12px;
    padding: .9rem 1rem; margin-bottom: 1.1rem; }
  .explain-box .explain-label { display: inline-block; background: var(--green); color: #fff;
    font-size: .7rem; font-weight: 700; padding: .15rem .55rem; border-radius: 20px; margin-bottom: .5rem; }
  .explain-box p { font-size: .9rem; line-height: 1.8; margin-bottom: .65rem; color: var(--gray-800); }
  .explain-box p:last-child { margin-bottom: 0; }
  .explain-box .point { background: var(--amber-light); border-radius: 8px; padding: .65rem .7rem; margin: .65rem 0; font-size: .87rem; }
  .explain-box .point p { margin-bottom: .5rem; line-height: 1.7; }
  .explain-box .point p:last-child { margin-bottom: 0; }

  /* 画像スライド */
  .lesson-img-wrap { cursor: pointer; margin-top: .2rem; }
  .lesson-img-wrap.small { width: 78%; margin: .5rem auto .2rem; }
  .lesson-img-wrap img { width: 100%; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.12); display: block; }
  .lesson-img-wrap:active img { opacity: .9; }
  .img-caption { font-size: .78rem; color: var(--gray-600); text-align: center; margin-top: .5rem; }
  .img-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.9); z-index: 1000; align-items: flex-start; justify-content: center; padding: 1rem; overflow-y: auto; }
  .img-modal.active { display: flex; }
  .img-modal img { max-width: 100%; height: auto; border-radius: 8px; }
  .img-modal .close-hint { position: fixed; top: .8rem; right: 1rem; color: #fff; font-size: .85rem; opacity: .9; background: rgba(0,0,0,.45); padding: .3rem .7rem; border-radius: 20px; }

  /* フッターナビ */
  .nav-bar { flex-shrink: 0; background: #fff; border-top: 1px solid var(--gray-200); padding: .7rem 1rem; padding-bottom: calc(.7rem + env(safe-area-inset-bottom)); display: flex; align-items: center; gap: .75rem; }
  .nav-btn { flex: 0 0 auto; padding: .6rem 1.1rem; border-radius: 8px; border: 1.5px solid var(--gray-300); background: #fff; font-size: .85rem; font-weight: 700; color: var(--gray-800); cursor: pointer; }
  .nav-btn.primary { background: var(--green); color: #fff; border-color: var(--green); }
  .nav-btn:disabled { opacity: .35; }
  .dots { flex: 1; display: flex; justify-content: center; gap: .35rem; flex-wrap: wrap; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--gray-300); }
  .dot.active { background: var(--green); width: 9px; height: 9px; }

  /* ── 印刷用（紙の資料として配布する場合）1スライド＝1ページ ── */
  @media print {
    @page { size: A4 portrait; margin: 12mm; }
    /* 背景色・見出しの色を紙にも印刷する */
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    html, body { height: auto; overflow: visible; display: block; background: #fff; }
    /* 画面用の「1枚だけ表示」レイアウトを解除し、全ページを縦に並べる */
    #deck { display: block; height: auto; overflow: visible; flex: none; }
    .slides { position: static; overflow: visible; height: auto; flex: none; }
    .slide {
      position: static; inset: auto; transform: none !important;
      overflow: visible; height: auto; pointer-events: auto; transition: none;
      padding: 0 0 .5rem; page-break-after: always; break-after: page;
    }
    .slide:last-child { page-break-after: auto; break-after: auto; }
    /* 画面操作用のパーツは印刷しない */
    .nav-bar, .img-caption { display: none !important; }
    .img-modal { display: none !important; }
    .site-header { padding: .5rem; margin-bottom: .6rem; }
    /* 途中で分断されると読みにくい要素はページ内に収める */
    .explain-box, .notice, .lesson-img-wrap, .plan-table, .steps > li { break-inside: avoid; page-break-inside: avoid; }
    .lesson-img-wrap img { max-height: 150mm; width: auto; max-width: 100%; margin: 0 auto; box-shadow: none; }
  }
</style>
</head>
<body>

<div class="site-header">
  <h1>青葉自動車学校</h1>
  <p>教習を始める前に知っておきたいこと</p>
</div>

<div id="deck">
  <div class="slides" id="slides"></div>
  <div class="nav-bar">
    <button class="nav-btn" id="prev-btn" onclick="go(-1)">戻る</button>
    <div class="dots" id="dots"></div>
    <button class="nav-btn primary" id="next-btn" onclick="go(1)">次へ</button>
  </div>
</div>

<div id="img-modal" class="img-modal" onclick="closeImgModal()">
  <span class="close-hint">タップで閉じる ✕</span>
  <img id="img-modal-img" src="" alt="拡大画像">
</div>

  {
    label: '学科・効果測定の期限',
    html: `
      <h2>学科・効果測定の期限</h2>
      <div class="explain-box">
        <span class="explain-label">かんたん解説</span>
        <p>技能教習を詰まらずに進めるカギは、<b>各段階の学科をすべて受講し、効果測定（学科テスト）に合格しておくこと</b>です。これが遅れると、技能の予約が取れていても「みきわめ教習」に乗れなくなってしまいます。</p>
        <div class="point"><p>📌 効果測定は、各段階の<b>みきわめ教習の前まで</b>に合格が必要です。</p></div>
        <div class="point"><p>💻 当校では<b>オンライン学科</b>の受講を推奨しています。1日<b>最大5コマ</b>まで受講でき、効率よく学科を進められます。</p><p>※ ご利用には<b>利用規約</b>がありますので、必ずご確認のうえご利用ください。</p></div>
      </div>

      <div style="background:var(--green-light);border-left:4px solid var(--green-dark);border-radius:6px;padding:.65rem .85rem;margin:.2rem 0 .5rem;font-size:.9rem;line-height:1.75;">
        <b>💡「みきわめ教習」とは？</b><br>各段階の<b>最後の技能教習</b>のことです。指導員が「次のステップ（修了検定・卒業検定）に進める運転技能が身についているか」を確認します。これを<b>見極（みきわ）め</b>と呼び、合格するとその段階の検定に進めます。
      </div>

      <div class="sub-head"><span class="dot-mark"></span>第1段階</div>
      <ul class="icon-list">
        <li>1段階は最短で<b>12回目がみきわめ</b>です</li>
        <li>遅れないよう、<b>技能10回目までに仮免前効果測定に合格</b>することをおすすめします</li>
      </ul>

      <div class="sub-head"><span class="dot-mark"></span>第2段階</div>
      <ul class="icon-list">
        <li>学科<b>11番「危険予測」は技能教習とセット</b>で、その技能は2段階<b>14・15回目（後半）</b>にあります</li>
        <li>それより前に他の学科を終わらせ、<b>早めに卒検前効果測定に合格</b>することをおすすめします</li>
      </ul>

      <div class="sub-head"><span class="dot-mark"></span>プラン別の注意</div>
      <ul class="icon-list">
        <li><b>スピードプラン</b>：一括予約のため、合格していないと<b>19回目の教習に乗車できなくなる可能性</b>があります（進度が遅れていて、まだみきわめ時限に達していなければ乗車は可能です）</li>
        <li><b>スピードプラン以外</b>：卒検前効果測定に合格しないと、<b>高速教習後の残り最短3時間分の予約が取れず</b>、時間が空いてしまうリスクがあります</li>
      </ul>

      <div class="notice red">
        <p>⚠️ <b>乗車できない場合も、予約は自動キャンセルされません。</b></p>
        <p>みきわめの時限になっても効果測定に合格していないと乗車できませんが、その技能予約は自動ではキャンセルされません。必ず<b>ご自身でキャンセル操作</b>を行ってください。操作を忘れると<b>無断キャンセル扱い</b>となり、<b>キャンセル料が発生します</b>のでご注意ください。</p>
      </div>
    `

      <p style="font-size:.8rem;color:var(--gray-600);margin-top:-.35rem;margin-bottom:.6rem;">※ 休校日を挟む場合は、前営業日の14:39が締切となります。</p>
      <div class="notice green">
        💬 MT・ATは別々に抽選・公表され、それぞれ上位40人まで番号が公表されます。40番台に入っていなくても参加は可能です。抽選結果は当日のみ有効で、抽選番号の使用は1回限りです。
      </div>
      <div class="sub-head"><span class="dot-mark"></span>当選した当日の流れ</div>
      <div class="notice amber">
        <p>🚗 キャンセル車が出た場合は、教習開始<b>10分前</b>に配車係から「<b>番号お持ちの方</b>」と声がかかります。</p>
        <p>カウンター前に来て、ご自分の抽選番号をお伝えください。その時<b>その場にいる方</b>の中で、抽選番号の<b>若い順（数字の小さい順）</b>に乗車できます。</p>
      </div>
    `
  },
];

let current = 0;

function openImgModal(src) {
  document.getElementById('img-modal-img').src = src;
  document.getElementById('img-modal').classList.add('active');
}
function closeImgModal() {
  document.getElementById('img-modal').classList.remove('active');
}

function init() {
  const total = SLIDES.length;
  const slidesEl = document.getElementById('slides');
  const dotsEl = document.getElementById('dots');
  slidesEl.innerHTML = SLIDES.map((s, i) =>
    `<div class="slide${i === 0 ? ' active' : ''}" data-i="${i}">
       <span class="slide-tag">${i + 1}/${total} ${s.label}</span>${s.html}
     </div>`
  ).join('');
  dotsEl.innerHTML = SLIDES.map((_, i) =>
    `<span class="dot${i === 0 ? ' active' : ''}"></span>`
  ).join('');
  render();
}

function render() {
  document.querySelectorAll('.slide').forEach((el, i) => {
    el.classList.toggle('active', i === current);
    el.classList.toggle('prev', i < current);
  });
  document.querySelectorAll('.dot').forEach((el, i) => el.classList.toggle('active', i === current));
  document.getElementById('prev-btn').disabled = current === 0;
  const nextBtn = document.getElementById('next-btn');
  nextBtn.style.visibility = current === SLIDES.length - 1 ? 'hidden' : 'visible';
}

function go(dir) {
  const next = current + dir;
  if (next < 0 || next >= SLIDES.length) return;
  current = next;
  render();
}

// ── 指の動きに追従するドラッグ式ページめくり ──
(function () {
  const slidesEl = document.getElementById('slides');
  let startX = 0, startY = 0, dragging = false, decided = false, width = 0;
  let elActive = null, elNext = null, elPrev = null;
  const slideAt = i => document.querySelectorAll('.slide')[i] || null;

  function clearInline() {
    [elActive, elNext, elPrev].forEach(el => { if (el) el.style.transform = ''; });
  }
  function reset() { dragging = false; decided = false; elActive = elNext = elPrev = null; }

  slidesEl.addEventListener('touchstart', e => {
    if (e.touches.length !== 1) return;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    width = slidesEl.clientWidth;
    dragging = false; decided = false;
    elActive = slideAt(current);
    elNext = slideAt(current + 1);
    elPrev = slideAt(current - 1);
  }, { passive: true });

  slidesEl.addEventListener('touchmove', e => {
    if (e.touches.length !== 1 || elActive === null) return;
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;
    if (!decided) {
      if (Math.abs(dx) < 8 && Math.abs(dy) < 8) return;
      decided = true;
      dragging = Math.abs(dx) > Math.abs(dy);        // 横が縦より大きければドラッグ
      if (dragging) slidesEl.classList.add('dragging');
    }
    if (!dragging) return;                             // 縦スクロールはそのまま通す
    e.preventDefault();
    let d = dx;
    if ((current === 0 && d > 0) || (current === SLIDES.length - 1 && d < 0)) d *= 0.3; // 端で抵抗
    elActive.style.transform = `translateX(${d}px)`;
    if (elNext) elNext.style.transform = `translateX(${width + Math.min(d, 0)}px)`;
    if (elPrev) elPrev.style.transform = `translateX(${-width + Math.max(d, 0)}px)`;
  }, { passive: false });

  slidesEl.addEventListener('touchend', e => {
    if (!dragging) { reset(); return; }
    const dx = e.changedTouches[0].clientX - startX;
    slidesEl.classList.remove('dragging');
    const threshold = Math.min(width * 0.25, 90);
    if (dx <= -threshold && current < SLIDES.length - 1) current++;
    else if (dx >= threshold && current > 0) current--;
    render();
    clearInline();
    reset();
  }, { passive: true });

  slidesEl.addEventListener('touchcancel', () => {
    slidesEl.classList.remove('dragging');
    render();
    clearInline();
    reset();
  }, { passive: true });
})();

init();
</script>
</body>
